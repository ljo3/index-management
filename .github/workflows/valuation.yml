name: Daily Valuation

on:
  schedule:
    - cron: '00 18 * * *'
  push:
   branches:
       - 'main'

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Set PYTHONPATH
      run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

    - name: Sync data from S3
      run: aws s3 sync s3://index-management-data/data/ data/ --region eu-west-3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Run Daily Valuation
      run: python .github/scripts/value_daily.py

    - name: Sync data to S3
      run: aws s3 sync data/ s3://index-management-data/data/ --region eu-west-3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Run Tests
      run: |
        pytest

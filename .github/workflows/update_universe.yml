name: Quarterly Universe Update

on:
  # Fire on the last four days of each quarter month so the job cannot miss
  # the quarter-end even if the scheduler skips a day. The script is idempotent
  # and exits early once the quarter has already been processed.
  schedule:
    - cron: '0 18 28,29,30,31 3,12 *'  # March & December (31-day months)
    - cron: '0 18 28,29,30 6,9 *'       # June & September (30-day months)
  workflow_dispatch:                      # allow manual runs at any time

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Sync data from S3
        run: aws s3 sync s3://index-management-data/data/ data/ --region eu-west-3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Update universe
        run: python .github/scripts/update_universe.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Sync data to S3
        run: aws s3 sync data/ s3://index-management-data/data/ --region eu-west-3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
